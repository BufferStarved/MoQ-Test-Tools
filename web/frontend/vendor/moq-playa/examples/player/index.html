<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playa — Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────── */
    .header {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      user-select: none;
      -webkit-user-select: none;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-brand .brand-text {
      font-size: 1.05rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.3px;
    }
    .header-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .header-btn:hover { background: rgba(255,255,255,0.05); }

    .page { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* ─── Player container ───────────────────────── */
    .player-wrap {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .player-wrap canvas, .player-wrap video {
      width: 100%; height: 100%; object-fit: contain;
    }
    .player-wrap.hide-cursor { cursor: none; }

    /* ─── Center play button (idle) ──────────────── */
    .center-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 15;
    }
    .center-play button {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none;
      backdrop-filter: blur(8px); color: #fff;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .center-play button:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }
    .center-play svg { width: 32px; height: 32px; margin-left: 3px; }

    /* ─── Center flash (play/pause feedback) ─────── */
    .center-flash {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 20;
    }
    .center-flash .flash-icon {
      background: rgba(0,0,0,0.5); border-radius: 50%;
      padding: 16px; backdrop-filter: blur(4px);
      animation: flash-fade 0.5s ease-out forwards;
    }
    .center-flash svg { width: 40px; height: 40px; fill: white; }
    @keyframes flash-fade {
      0% { transform: scale(0.8); opacity: 0.9; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    /* ─── Loading spinner ────────────────────────── */
    .loading-spinner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 15;
    }
    .loading-spinner svg {
      width: 40px; height: 40px; color: rgba(255,255,255,0.6);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Bottom control bar ─────────────────────── */
    .controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 40px 16px 12px;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .controls.hidden { opacity: 0; pointer-events: none; }
    .controls-row {
      display: flex; align-items: center; gap: 6px;
    }
    .controls-row button, .controls-row .ctrl-btn {
      background: none; border: none; color: rgba(255,255,255,0.7);
      cursor: pointer; padding: 6px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .controls-row button:hover, .controls-row .ctrl-btn:hover {
      color: #fff; background: rgba(255,255,255,0.1);
    }
    .controls-row button:disabled { opacity: 0.3; cursor: default; }
    .controls-row svg { width: 20px; height: 20px; }
    .controls-spacer { flex: 1; }

    /* ─── Track dropdowns (in controls) ──────────── */
    .track-dropdown { position: relative; display: none; }
    .track-dropdown.visible { display: inline-block; }
    .track-dropdown-btn {
      padding: 4px 10px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #e0e0e0;
      font-size: 0.75rem; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .track-dropdown-btn:hover { background: rgba(255,255,255,0.1); }
    .track-dropdown-btn .chevron {
      font-size: 0.5rem; opacity: 0.5; transition: transform 0.15s;
    }
    .track-dropdown.open .chevron { transform: rotate(180deg); }
    .track-dropdown-menu {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 0;
      min-width: 180px; background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 4px; z-index: 50;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
    }
    .track-dropdown.open .track-dropdown-menu { display: block; }
    .track-dropdown-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; border-radius: 5px; cursor: pointer;
      font-size: 0.8rem; color: #ccc; transition: background 0.1s;
    }
    .track-dropdown-item:hover { background: rgba(255,255,255,0.06); }
    .track-dropdown-item.active { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .track-dropdown-item .item-detail {
      font-size: 0.7rem; color: rgba(255,255,255,0.35);
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .track-dropdown-item.active .item-detail { color: rgba(96,165,250,0.6); }

    /* ─── Stats overlay ──────────────────────────── */
    .stats-overlay {
      position: absolute; top: 12px; left: 12px; right: 12px;
      max-height: calc(100% - 24px);
      overflow-y: auto;
      background: rgba(0,0,0,0.78); color: #e8e8e8;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      font-size: 11.5px; line-height: 1.55;
      padding: 14px 18px; border-radius: 8px;
      pointer-events: none; opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 25;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .stats-overlay.visible { opacity: 1; transform: translateY(0); }
    .stats-overlay .stats-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .stats-toolbar {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 4px; pointer-events: auto;
    }
    .stats-toolbar button {
      width: 24px; height: 24px; border-radius: 4px;
      border: none; background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .stats-toolbar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .stats-toolbar button.recording { background: rgba(220,38,38,0.3); color: #f87171; }
    .stats-toolbar svg { width: 14px; height: 14px; }
    .stats-overlay .stats-title::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.5);
    }
    .stats-overlay .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 32px; }
    .stats-overlay .stats-section { margin-bottom: 8px; }
    .stats-overlay .section-label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      margin-bottom: 3px; margin-top: 2px;
    }
    .stats-overlay .stat-row { display: flex; justify-content: space-between; gap: 12px; }
    .stats-overlay .stat-label { color: rgba(255,255,255,0.5); }
    .stats-overlay .stat-value { color: #fff; font-variant-numeric: tabular-nums; text-align: right; }
    .stats-overlay .stat-value.highlight { color: #60a5fa; }
    .stats-overlay .stat-value.good { color: #4ade80; }
    .stats-overlay .stat-value.warn { color: #fbbf24; }
    .stats-overlay .stat-value.bad { color: #f87171; }
    .stats-overlay .ttff-bar { display: flex; gap: 1px; margin-top: 4px; height: 3px; border-radius: 2px; overflow: hidden; }
    .stats-overlay .ttff-segment { height: 100%; min-width: 2px; border-radius: 1px; }
    .pipeline-bar { display: flex; align-items: center; gap: 0; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .pipeline-stage { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .pipeline-stage .pill { font-size: 9px; font-weight: 600; padding: 3px 6px; border-radius: 4px; text-align: center; width: 100%; }
    .pipeline-stage .pill.done { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .pipeline-stage .pill.active { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.4); animation: pulse-glow 1.5s ease-in-out infinite; }
    .pipeline-stage .pill.pending { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.06); }
    .pipeline-stage .timing { font-size: 8px; margin-top: 2px; color: rgba(255,255,255,0.3); }
    .pipeline-arrow { color: rgba(255,255,255,0.15); font-size: 8px; margin: 0 1px; flex-shrink: 0; }
    .pipeline-arrow.done { color: rgba(74,222,128,0.4); }
    @keyframes pulse-glow { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 8px 2px rgba(96,165,250,0.2); } }

    /* ─── Sparklines ─────────────────────────────── */
    .sparkline-section { margin-top: 6px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); contain: content; }
    .sparkline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .sparkline-label { font-size: 9px; color: rgba(255,255,255,0.4); width: 52px; text-align: right; flex-shrink: 0; }
    .sparkline-canvas { flex: 1; height: 24px; border-radius: 3px; background: rgba(255,255,255,0.03); will-change: transform; }
    .sparkline-value { font-size: 9px; color: rgba(255,255,255,0.6); width: 48px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* ─── Log ────────────────────────────────────── */
    pre {
      background: #0d0d20; color: rgba(255,255,255,0.5);
      padding: 12px 16px; border-radius: 8px; font-size: 0.8rem;
      max-height: 200px; overflow-y: auto; white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.04); margin-top: 16px;
    }

    /* ─── Settings modal ─────────────────────────── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(6px);
    }
    .modal-backdrop.visible { display: flex; align-items: center; justify-content: center; }
    .modal {
      background: #1a1a2e; color: #e0e0e0; border-radius: 12px; padding: 24px;
      width: min(560px, 90vw); max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
    }
    .modal h2 { margin: 0 0 16px; font-size: 1.1rem; color: #fff; }
    .modal label { display: block; font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.3);
      color: #fff; font-family: 'SF Mono', monospace; font-size: 0.85rem;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: #60a5fa; }
    .modal textarea { resize: vertical; min-height: 120px; }
    .modal .hint { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .modal .btn-row { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal .btn-row button { font-size: 0.9rem; padding: 8px 20px; border-radius: 6px; cursor: pointer; border: none; }
    .modal #settings-apply { background: #3b82f6; color: #fff; }
    .modal #settings-cancel { background: rgba(255,255,255,0.1); color: #e0e0e0; }
  </style>
</head>
<body>

<!-- Settings modal -->
<div id="settings-backdrop" class="modal-backdrop">
  <div class="modal">
    <h2>Settings</h2>
    <label for="s-url">Relay URL</label>
    <input id="s-url" type="text" placeholder="https://localhost:4443">
    <div class="hint">WebTransport endpoint</div>
    <label for="s-ns">Namespace</label>
    <input id="s-ns" type="text" placeholder="live/broadcast">
    <label for="s-hash">Certificate Hash</label>
    <input id="s-hash" type="text" placeholder="(none)">
    <label for="s-version">Draft Version</label>
    <select id="s-version">
      <option value="">Auto (default moqt-16)</option>
      <option value="18">Draft 18</option>
      <option value="16">Draft 16</option>
      <option value="14">Draft 14</option>
    </select>
    <label for="s-catalog">Catalog JSON (optional)</label>
    <textarea id="s-catalog" placeholder='{"tracks":[...]}'></textarea>
    <label for="s-late">Late Frame Threshold (ms)</label>
    <input id="s-late" type="number" placeholder="100">
    <label for="s-gap">Gap Timeout (ms)</label>
    <input id="s-gap" type="number" placeholder="500">
    <label style="display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;text-transform:none;letter-spacing:0">
      <input id="s-swdec" type="checkbox"> Software H.264 decoder
    </label>
    <label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;text-transform:none;letter-spacing:0">
      <input id="s-fetch-catalog" type="checkbox"> FETCH catalog (skip catalog SUBSCRIBE)
    </label>
    <div class="btn-row">
      <button id="settings-cancel">Cancel</button>
      <button id="settings-apply">Apply &amp; Reload</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-brand">
    <svg version="1.0" height="22px" width="76px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 83 22"><style>.st0{fill:#DB1F26;}.st1{fill:#FFFFFF;}</style><g><polygon class="st0" points="12.3,10.9 12.3,6.6 16.8,6.6 16.8,3.8 2,3.8 2,11.6 6.4,11.6 6.4,15.9 2,15.9 2,18.7 16.8,18.7 16.8,10.9"/></g><g><path class="st1" d="M27.5,13.3V19h-2.7V4.5h4.4c1,0,1.8,0.1,2.5,0.3c0.7,0.2,1.3,0.5,1.7,0.9C34,6,34.3,6.5,34.5,7c0.2,0.5,0.3,1.1,0.3,1.7c0,0.5-0.1,0.9-0.2,1.4s-0.4,0.8-0.6,1.2c-0.3,0.4-0.6,0.7-1,0.9s-0.8,0.5-1.4,0.6c0.3,0.2,0.6,0.5,0.9,0.8l3.6,5.3h-2.4c-0.2,0-0.4,0-0.6-0.1c-0.2-0.1-0.3-0.2-0.4-0.4l-3-4.6c-0.1-0.2-0.2-0.3-0.4-0.4s-0.3-0.1-0.6-0.1H27.5z M27.5,11.4h1.7c0.5,0,0.9-0.1,1.3-0.2c0.4-0.1,0.7-0.3,0.9-0.5c0.2-0.2,0.4-0.5,0.5-0.8c0.1-0.3,0.2-0.6,0.2-1c0-0.7-0.2-1.3-0.7-1.7c-0.5-0.4-1.2-0.6-2.2-0.6h-1.7V11.4z"/><path class="st1" d="M48.6,4.5v2.1h-6.4v4h5.1v2.1h-5.1v4.1h6.4V19h-9.1V4.5H48.6z"/><path class="st1" d="M65.3,11.7c0,1.1-0.2,2-0.5,2.9c-0.4,0.9-0.8,1.6-1.5,2.3c-0.6,0.6-1.4,1.1-2.3,1.5c-0.9,0.4-1.9,0.5-3,0.5h-5.5V4.5H58c1.1,0,2.1,0.2,3,0.5c0.9,0.4,1.7,0.9,2.3,1.5c0.6,0.6,1.1,1.4,1.5,2.3C65.2,9.7,65.3,10.7,65.3,11.7z M62.6,11.7c0-0.8-0.1-1.5-0.3-2.1C62.1,9,61.8,8.4,61.4,8c-0.4-0.4-0.9-0.8-1.4-1S58.7,6.6,58,6.6h-2.8v10.2H58c0.7,0,1.3-0.1,1.9-0.4s1-0.6,1.4-1c0.4-0.4,0.7-1,0.9-1.6C62.5,13.2,62.6,12.5,62.6,11.7z"/><path class="st1" d="M77.5,5.5c0,0.4-0.1,0.6-0.3,0.9c-0.2,0.2-0.6,0.3-1.1,0.3h-4l-0.5,3c0.7-0.1,1.2-0.2,1.8-0.2c0.8,0,1.4,0.1,2,0.3c0.6,0.2,1.1,0.5,1.5,0.9c0.4,0.4,0.7,0.9,0.9,1.4c0.2,0.5,0.3,1.1,0.3,1.7c0,0.8-0.1,1.5-0.4,2.1c-0.3,0.6-0.6,1.2-1.1,1.6c-0.5,0.5-1,0.8-1.7,1c-0.7,0.2-1.4,0.4-2.1,0.4c-0.5,0-0.9,0-1.3-0.1c-0.4-0.1-0.8-0.2-1.1-0.4c-0.4-0.2-0.7-0.3-1-0.5c-0.3-0.2-0.6-0.4-0.8-0.6l0.8-1c0.2-0.2,0.4-0.3,0.6-0.3c0.2,0,0.3,0.1,0.5,0.2c0.2,0.1,0.4,0.2,0.6,0.3s0.5,0.2,0.8,0.3c0.3,0.1,0.7,0.2,1.1,0.2c0.5,0,0.9-0.1,1.2-0.2s0.6-0.4,0.9-0.6c0.2-0.3,0.4-0.6,0.5-0.9c0.1-0.4,0.2-0.8,0.2-1.2c0-0.8-0.2-1.4-0.7-1.8s-1.1-0.7-2-0.7c-0.7,0-1.4,0.1-2.1,0.4l-1.5-0.4l1.2-7h7.1V5.5z"/></g></svg>
    <span class="brand-text">Playa</span>
  </div>
  <button class="header-btn" id="settings-btn">Settings</button>
</div>

<div class="page">
  <div class="player-wrap" id="player-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <video id="video" hidden autoplay style="max-width:100%;background:#000"></video>

    <!-- Stats overlay -->
    <div id="stats-overlay" class="stats-overlay">
      <div class="stats-toolbar">
        <button id="qlog-download" title="Record qlog">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>
        </button>
        <button id="stats-close" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="stats-content"></div>
      <div class="sparkline-section" id="sparkline-section" style="display:none">
        <div class="sparkline-row">
          <span class="sparkline-label">Jitter</span>
          <canvas id="spark-jitter" class="sparkline-canvas"></canvas>
          <span class="sparkline-value" id="spark-jitter-val">--</span>
        </div>
        <div class="sparkline-row">
          <span class="sparkline-label">Latency</span>
          <canvas id="spark-latency" class="sparkline-canvas"></canvas>
          <span class="sparkline-value" id="spark-latency-val">--</span>
        </div>
      </div>
    </div>

    <!-- Center play button (before start) -->
    <div class="center-play" id="center-play">
      <button id="start">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v14l11-7-11-7z"/></svg>
      </button>
    </div>

    <!-- Loading spinner -->
    <div class="loading-spinner" id="loading-spinner" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
        <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <!-- Center flash (play/pause feedback) -->
    <div class="center-flash" id="center-flash" style="display:none">
      <div class="flash-icon" id="flash-icon"></div>
    </div>

    <!-- Bottom control bar -->
    <div class="controls" id="controls" style="display:none">
      <div class="controls-row">
        <!-- Play/Pause -->
        <button id="pause" title="Play/Pause">
          <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
        </button>

        <!-- Track dropdowns -->
        <div id="video-track-dropdown" class="track-dropdown">
          <div class="track-dropdown-btn" id="video-track-btn">
            <span id="video-track-label">Video</span>
            <span class="chevron">&#9660;</span>
          </div>
          <div class="track-dropdown-menu" id="video-track-menu"></div>
        </div>
        <div id="audio-track-dropdown" class="track-dropdown">
          <div class="track-dropdown-btn" id="audio-track-btn">
            <span id="audio-track-label">Audio</span>
            <span class="chevron">&#9660;</span>
          </div>
          <div class="track-dropdown-menu" id="audio-track-menu"></div>
        </div>

        <div class="controls-spacer"></div>

        <!-- Stats -->
        <button id="stats-btn" title="Stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 6-6"/></svg>
        </button>
        <!-- Settings is in the header -->
        <!-- Fullscreen -->
        <button id="fullscreen-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="stats" style="display:none"></div>
  <pre id="log"></pre>
</div>

<script type="module" src="main.ts"></script>
</body>
</html>

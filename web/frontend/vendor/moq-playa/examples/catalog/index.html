<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playa — Catalog Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────── */
    .header {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-brand {
      display: flex; align-items: center; gap: 8px;
    }
    .header-brand .brand-text {
      font-size: 1.05rem; font-weight: 500;
      color: rgba(255,255,255,0.7); letter-spacing: -0.3px;
    }
    .header-brand .brand-sub {
      font-size: 0.8rem; color: rgba(255,255,255,0.3);
      margin-left: 4px;
    }

    .page { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* ─── Controls ────────────────────────────────── */
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: flex-end;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 16px 20px;
      margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .field input, .field select {
      padding: 6px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3); color: #fff;
      font-family: 'SF Mono', monospace; font-size: 0.85rem;
    }
    .field input:focus, .field select:focus {
      outline: none; border-color: #60a5fa;
    }
    .field-url { flex: 1; min-width: 220px; }
    .field-url input { width: 100%; }
    .btn-read {
      padding: 7px 20px; border-radius: 6px; border: none;
      background: #3b82f6; color: #fff; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; white-space: nowrap;
      align-self: flex-end;
    }
    .btn-read:hover:not(:disabled) { background: #2563eb; }
    .btn-read:disabled { opacity: 0.5; cursor: default; }

    /* ─── Status ──────────────────────────────────── */
    .status {
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 0.85rem;
      background: rgba(96,165,250,0.08);
      color: rgba(96,165,250,0.8);
      border: 1px solid rgba(96,165,250,0.15);
    }
    .status.error {
      background: rgba(248,113,113,0.08);
      color: rgba(248,113,113,0.8);
      border-color: rgba(248,113,113,0.15);
    }
    .status.success {
      background: rgba(74,222,128,0.08);
      color: rgba(74,222,128,0.8);
      border-color: rgba(74,222,128,0.15);
    }

    /* ─── Catalog table ──────────────────────────── */
    .catalog-section { margin-bottom: 20px; }
    .catalog-section h2 {
      font-size: 0.95rem; color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }
    .catalog-meta {
      font-size: 0.8rem; color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
    }
    .catalog-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .catalog-table th {
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5);
      text-align: left; padding: 8px 12px; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.5px; white-space: nowrap;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .catalog-table td {
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .catalog-table tbody tr.data-row:hover td {
      background: rgba(255,255,255,0.02);
    }
    .col-idx { width: 2rem; text-align: center; color: rgba(255,255,255,0.25); }
    .col-expand { width: 2rem; text-align: center; }

    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 4px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-video { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .badge-audio { background: rgba(74,222,128,0.15); color: #4ade80; }
    .badge-data { background: rgba(168,85,247,0.15); color: #a855f7; }
    .badge-other { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }

    .dim { color: rgba(255,255,255,0.2); }

    .expand-btn {
      background: none; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; cursor: pointer; font-size: 0.7rem;
      padding: 2px 6px; color: rgba(255,255,255,0.4);
    }
    .expand-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

    .detail-row td {
      padding: 0 !important;
      background: rgba(0,0,0,0.3) !important;
    }
    .detail-row pre {
      margin: 0; padding: 12px 16px; border-radius: 0;
      max-height: 20rem; font-size: 0.8rem;
      white-space: pre-wrap; word-break: break-all;
      background: transparent; color: rgba(255,255,255,0.5);
      overflow-y: auto;
    }

    /* ─── Log ────────────────────────────────────── */
    pre.log {
      background: #0d0d20; color: rgba(255,255,255,0.4);
      padding: 12px 16px; border-radius: 8px;
      font-size: 0.8rem; max-height: 200px;
      overflow-y: auto; white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-brand">

.2-7h7.1V5.5z"/></g></svg>
    <span class="brand-text">Playa</span>
    <span class="brand-sub">Catalog Viewer</span>
  </div>
</div>

<div class="page">
  <form id="config" class="controls">
    <div class="field field-url">
      <label for="relay-url">Relay URL</label>
      <input type="url" id="relay-url" placeholder="https://localhost:4433" spellcheck="false" />
    </div>
    <div class="field">
      <label for="namespace">Namespace</label>
      <input type="text" id="namespace" placeholder="live" style="width:9rem" spellcheck="false" />
    </div>
    <div class="field">
      <label for="draft-version">Version</label>
      <select id="draft-version" style="min-width:12rem">
        <option value="">Auto (default moqt-16)</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
      </select>
    </div>
    <div class="field">
      <label for="cert-hash">Cert Hash</label>
      <input type="text" id="cert-hash" placeholder="(none)" style="width:10rem" spellcheck="false" />
    </div>
    <button type="submit" id="run" class="btn-read">Read Catalog</button>
  </form>

  <div id="status" class="status">Ready.</div>
  <div id="catalog" class="catalog-section" hidden></div>
  <pre id="log" class="log"></pre>
</div>

<script type="module" src="main.ts"></script>
</body>
</html>
